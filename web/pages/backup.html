<!--
页面总览：数据备份页：汇总本地数据规模，并提供导出/导入入口。
补充说明：导出或导入全量数据
前端入口：app_tools_c.js -> initBackupPage()
后端链路：api.py -> export_data() / import_data() / get_data_stats()
-->

<!-- 自动拆分自 web/index.html：backup -->
<!-- 页面骨架：上方是标题说明，主体分为数据概览、导出/导入操作卡片，以及底部结果反馈区。 -->
<section id="page-backup" class="page">
    <!-- 页面头部：说明这是全量数据备份入口。 -->
    <div class="page-header">
        <div class="page-title">
            <h1>数据备份</h1>
            <p class="subtitle">导出或导入全量数据</p>
        </div>
    </div>

    <!-- 页面主体：先看当前数据规模，再执行导出或导入。 -->
    <div class="backup-tool">
        <!-- 数据概览区：通过 get_data_stats() 动态回填各类本地数据数量。 -->
        <div class="backup-stats" id="backup-stats">
            <div class="backup-stat-card">
                <div class="backup-stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
                <div class="backup-stat-value" id="stat-tabs">-</div>
                <div class="backup-stat-label">页签</div>
            </div>
            <div class="backup-stat-card">
                <div class="backup-stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></div>
                <div class="backup-stat-value" id="stat-commands">-</div>
                <div class="backup-stat-label">命令</div>
            </div>
            <div class="backup-stat-card">
                <div class="backup-stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></div>
                <div class="backup-stat-value" id="stat-credentials">-</div>
                <div class="backup-stat-label">凭证</div>
            </div>
            <div class="backup-stat-card">
                <div class="backup-stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
                <div class="backup-stat-value" id="stat-nodes">-</div>
                <div class="backup-stat-label">节点</div>
            </div>
        </div>

        <!-- 备份操作区：左侧导出备份文件，右侧选择 JSON 文件进行恢复。 -->
        <div class="backup-actions">
            <div class="backup-action-card">
                <div class="backup-action-header">
                    <span class="backup-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
                    <h3>导出数据</h3>
                </div>
                <p class="backup-action-desc">将所有数据导出为 JSON 文件，便于备份或迁移</p>

                <!-- 导出按钮：调用 exportBackup()，生成并下载完整备份文件。 -->
                <button class="btn btn-primary" onclick="exportBackup()">
                    <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> 导出备份
                </button>
            </div>

            <div class="backup-action-card">
                <div class="backup-action-header">
                    <span class="backup-action-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
                    <h3>导入数据</h3>
                </div>
                <p class="backup-action-desc">从 JSON 文件恢复数据（将覆盖现有数据）</p>

                <!-- 隐藏文件输入框：选择 JSON 文件后触发 importBackup(event)。 -->
                <input type="file" id="backup-file-input" accept=".json" style="display:none" onchange="importBackup(event)">

                <!-- 选择文件按钮：代理点击隐藏的文件输入框。 -->
                <button class="btn btn-secondary" onclick="document.getElementById('backup-file-input').click()">
                    <span class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></span> 选择文件
                </button>
            </div>
        </div>

        <!-- 结果反馈区：导入或导出结束后显示摘要、成功/失败状态。 -->
        <div id="backup-result" class="backup-result" style="display:none"></div>
    </div>
</section>
