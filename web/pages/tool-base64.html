<!--
页面总览：Base64 编解码 页：这里主要放输入区、输出区和局部操作按钮，具体交互逻辑由前端工具模块负责。
补充说明：文本（UTF-8）与 Base64 互相转换，支持拖拽文件
前端入口：app_tools_a.js -> initBase64Tool()
-->

<!-- 自动拆分自 web/index.html：tool-base64 -->
<!-- 页面骨架：这是标准的编解码工具页，包含页面头部、左右双栏工作区和底部历史记录区。 -->
<section id="page-tool-base64" class="page">
    <!-- 页面头部：展示工具标题和用途说明，让用户快速知道当前是 Base64 文本转换工具。 -->
    <div class="page-header">
        <div class="page-title">
            <h1>Base64 编解码</h1>
            <p class="subtitle">文本（UTF-8）与 Base64 互相转换，支持拖拽文件</p>
        </div>
    </div>

    <!-- 主工作区：左右分栏布局，左侧负责输入与模式配置，右侧负责输出结果。 -->
    <div class="converter-layout">
        <!-- 输入面板：填写原始文本或待解码内容，并配置当前处理模式。 -->
        <div class="converter-panel">
            <div class="panel-header">
                <h3>输入</h3>
                <!-- 面板按钮区：编码/解码切换决定处理方向，清空按钮用于重置当前工具状态。 -->
                <div class="panel-actions">
                    <!-- 模式切换组：调用 setBase64Mode()，在编码与解码之间切换。 -->
                    <div class="format-toggle" title="选择模式">
                        <button class="btn btn-sm btn-ghost format-btn" id="b64-encode-btn" onclick="setBase64Mode('encode')">编码</button>
                        <button class="btn btn-sm btn-ghost format-btn" id="b64-decode-btn" onclick="setBase64Mode('decode')">解码</button>
                    </div>
                    <!-- 清空按钮：清除输入、输出和错误提示。 -->
                    <button class="btn btn-sm btn-ghost" onclick="clearBase64Tool()">清空</button>
                </div>
            </div>
            <div class="panel-body">
                <!-- 输入框：支持直接粘贴文本，也支持把文件内容拖拽到此区域。 -->
                <textarea id="b64-input" placeholder="输入内容或拖拽文件到此处..."></textarea>

                <!-- 配置区：批量开关控制是否按“每行一条”分别做 Base64 编解码。 -->
                <div class="tool-options-row">
                    <label class="tool-check" title="按行处理输入/输出">
                        <input type="checkbox" id="b64-batch" onchange="updateBase64Tool()">
                        批量（按行）
                    </label>
                </div>

                <!-- 错误提示区：由 JS 动态写入非法 Base64、解码失败等提示信息。 -->
                <div id="b64-errors" class="error-list"></div>
            </div>
        </div>

        <!-- 输出面板：展示转换结果，并提供复制和附加跳转入口。 -->
        <div class="converter-panel">
            <div class="panel-header">
                <h3>输出</h3>
                <!-- 面板按钮区：复制按钮把当前输出内容复制到剪贴板。 -->
                <div class="panel-actions">
                    <button class="btn btn-sm btn-ghost" onclick="copyBase64Output(this)">复制</button>
                </div>
            </div>
            <div class="panel-body">
                <!-- 输出框：只读展示编码或解码后的最终结果。 -->
                <textarea id="b64-output" readonly placeholder="输出结果..."></textarea>

                <!-- 动态跳转按钮容器：由对应 JS 按当前结果状态动态渲染快捷操作按钮。 -->
                <div id="b64-jump-buttons" class="b64-jump-buttons"></div>
            </div>
        </div>
    </div>

    <!-- 历史记录区：保留最近使用过的输入/输出，方便重复查看与回填。 -->
    <div class="tool-history-panel">
        <div class="panel-header">
            <h3>历史记录</h3>
            <!-- 历史按钮区：清空按钮用于移除当前工具的历史记录。 -->
            <div class="panel-actions">
                <button class="btn btn-sm btn-ghost" onclick="clearBase64History()">清空</button>
            </div>
        </div>

        <!-- 历史列表容器：由 JS 动态渲染历史项，通常可用于再次加载之前的转换内容。 -->
        <div id="b64-history" class="history-list"></div>
    </div>
</section>
