<!--
页面总览：变量命名转换 页：这里主要放输入区、输出区和局部操作按钮，具体交互逻辑由前端工具模块负责。
补充说明：7 种格式互转（含中文名称）
前端入口：app_tools_a.js -> initNamingTool()
-->

<!-- 自动拆分自 web/index.html：tool-naming -->
<!-- 页面骨架：上方是标题与清空入口，下方结果网格同时展示多种命名风格。 -->
<section id="page-tool-naming" class="page">

<!-- 页面头部：说明当前工具用于变量命名风格互转。 -->

<div class="page-header">
		                    <div class="page-title">
		                        <h1>变量命名转换</h1>
		                        <p class="subtitle">7 种格式互转（含中文名称）</p>
		                    </div>

<!-- 页面操作区：提供一键清空，重置输入并同步清空所有命名结果。 -->

<div class="page-actions">
		                        <button class="btn btn-ghost" onclick="clearNamingTool()">清空</button>
		                    </div>
		                </div>
		                <!-- 结果网格：输入任意命名形式后，页面会并列生成多种命名风格并提供复制按钮。 -->
                <div class="naming-grid">
		                    <div class="naming-card naming-input">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">输入</div>
		                        </div>
		                        <div class="naming-card-body">
		                            <textarea id="naming-input" placeholder="如：userAge / user_age / user-age / USER_AGE" oninput="updateNamingTool()"></textarea>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">空格小写（space case）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'space')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-space"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">单词首字母大写（Camel Case）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'camelSpace')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-camelSpace"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">连字符小写（kebab-case）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'kebab')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-kebab"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">下划线全大写（SNAKE_CASE）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'snakeUpper')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-snakeUpper"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">大驼峰（CamelCase）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'pascal')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-pascal"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">小驼峰（camelCase）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'camel')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-camel"></div>
		                        </div>
		                    </div>

		                    <div class="naming-card">
		                        <div class="naming-card-header">
		                            <div class="naming-card-title">下划线小写（snake_case）</div>
		                            <button class="btn btn-sm btn-ghost" onclick="copyNamingOutput(this, 'snake')">复制</button>
		                        </div>
		                        <div class="naming-card-body">
		                            <div class="naming-output" id="naming-snake"></div>
		                        </div>
		                    </div>
		                </div>
		            </section>
