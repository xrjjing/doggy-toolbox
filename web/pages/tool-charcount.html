<!--
页面总览：字符统计 页：这里主要放输入区、输出区和局部操作按钮，具体交互逻辑由前端工具模块负责。
补充说明：字数、字符数、字节数（UTF-8）、行数统计
前端入口：app_tools_b.js -> initCharCountTool()
-->

<!-- 自动拆分自 web/index.html：tool-charcount -->
<!-- 页面骨架：这是单页统计工具，上方是标题和清空入口，下方依次是输入区与统计结果区。 -->
<section id="page-tool-charcount" class="page">

<!-- 页面头部：说明当前工具用于统计字符、字节、行数和词数。 -->

<div class="page-header">
		                    <div class="page-title">
		                        <h1>字符统计</h1>
		                        <p class="subtitle">字数、字符数、字节数（UTF-8）、行数统计</p>
		                    </div>

<!-- 页面操作区：仅保留清空按钮，用于重置输入并同步清零所有统计值。 -->

<div class="page-actions">
		                        <button class="btn btn-ghost" onclick="clearCharCountTool()">清空</button>
		                    </div>
		                </div>
<!-- 主工作区：上半部分录入待统计文本，下半部分以指标卡形式展示各种统计结果。 -->
<div class="tool-single charcount-tool">
		                    <div class="converter-panel">
		                        <div class="panel-header">
		                            <h3>输入文本</h3>
		                        </div>
		                        <div class="panel-body">
		                            <textarea id="charcount-input" placeholder="输入要统计的文本..." oninput="updateCharCountTool()"></textarea>
		                        </div>
		                    </div>

		                    <div class="converter-panel">
		                        <div class="panel-header">
		                            <h3>统计结果</h3>
		                        </div>
		                        <div class="panel-body charcount-output">
		                            <!-- 统计结果网格：集中展示字符数、字节数、行数、中文字数和英文单词数。 -->
                            <div class="charcount-grid">
		                                <div class="charcount-item">
		                                    <div class="charcount-label">字符数（含空格）</div>
		                                    <div class="charcount-value" id="charcount-chars">0</div>
		                                </div>
		                                <div class="charcount-item">
		                                    <div class="charcount-label">字符数（不含空格）</div>
		                                    <div class="charcount-value" id="charcount-chars-nospace">0</div>
		                                </div>
		                                <div class="charcount-item">
		                                    <div class="charcount-label">字节数（UTF-8）</div>
		                                    <div class="charcount-value" id="charcount-bytes">0</div>
		                                </div>
		                                <div class="charcount-item">
		                                    <div class="charcount-label">行数</div>
		                                    <div class="charcount-value" id="charcount-lines">0</div>
		                                </div>
		                                <div class="charcount-item">
		                                    <div class="charcount-label">中文字数</div>
		                                    <div class="charcount-value" id="charcount-chinese">0</div>
		                                </div>
		                                <div class="charcount-item">
		                                    <div class="charcount-label">英文单词数</div>
		                                    <div class="charcount-value" id="charcount-words">0</div>
		                                </div>
		                            </div>
		                        </div>
		                    </div>
		                </div>
		            </section>
